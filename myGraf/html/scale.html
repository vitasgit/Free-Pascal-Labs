    <h1>Гэомэтр 1.0: Масштабирование</h1>

     Масштабирование используется для измененения масштаба графика в диапазоне [0.1,10].<br>
     Масштабирование производится отдельно для осей абсцисс и ординат.<br>
     Изменение масштаба автоматически приводит к перерисовке графика.
